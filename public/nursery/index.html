<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGP DENR Palawan - Data Management System</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .login-container {
            background: linear-gradient(135deg, rgba(46, 125, 50, 0.9), rgba(27, 94, 32, 0.95)), url('https://images.unsplash.com/photo-1511497584788-876760111969?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
        }
        
        .login-card {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 3rem;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background-color: var(--bg-white);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--primary-color);
            box-shadow: var(--shadow-md);
        }

        .google-btn {
            background-color: var(--bg-white);
            color: var(--text-dark);
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            margin-top: 2rem;
            position: relative;
        }

        .google-btn:hover {
            background-color: #f8f9fa;
            color: var(--text-dark);
        }

        .footer-text {
            margin-top: 2rem;
            color: rgba(255,255,255,0.7);
            font-size: 0.875rem;
        }
    </style>
</head>
<body class="login-container full-screen flex-center">

    <div class="card login-card">
        <div class="brand-logo">
            <i class="fas fa-tree"></i>
        </div>
        <h1 style="margin-bottom: 0.5rem; color: var(--primary-dark);">NGP Palawan</h1>
        <p style="color: var(--text-medium); margin-bottom: 2rem;">Data Management & Monitoring System</p>
        
        <div style="text-align: left; background: #e8f5e9; padding: 1rem; border-radius: 8px; font-size: 0.9rem; color: var(--primary-dark);">
            <i class="fas fa-info-circle"></i> <strong>Note:</strong> Please use your NGP-issued Google Account to access the dashboard.
        </div>

        <button class="btn google-btn" onclick="handleLogin()">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" style="width: 24px; height: 24px;">
            Sign in with Google
        </button>
    </div>

    <script>
        function handleLogin() {
            // Mock login - redirect to dashboard
            const btn = document.querySelector('.google-btn');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Authenticating...';
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        }
    </script>
</body>
</html>
